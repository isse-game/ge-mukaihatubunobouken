<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ゲーム開発部の冒険</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      border: 2px solid #555;
      background: #020617;
    }
  </style>
</head>

<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// =====================
// ゲーム状態
// =====================

let gameState = "title";
let selectedCharacter = "midori";

let menuBgmStarted = false;


// =====================
// タイトル・背景
// =====================

const titleImg = new Image();
titleImg.src = "images/title_screen.png";

const backgroundImg = new Image();
backgroundImg.src = "images/background_lab.png";

let bgY = 0;
const bgSpeed = 2;

// =====================
// 自機画像
// =====================

const playerImages = {
  midori: {
    normal: new Image(),
    shoot: new Image(),
    stand: new Image()
  },

  momoi: {
    normal: new Image(),
    shoot: new Image(),
    stand: new Image()
  }
};

playerImages.midori.normal.src = "images/midori2.png";
playerImages.midori.shoot.src = "images/midori1.png";
playerImages.midori.stand.src = "images/midori3.png";

playerImages.momoi.normal.src = "images/momoi2.png";
playerImages.momoi.shoot.src = "images/momoi1.png";
playerImages.momoi.stand.src = "images/momoi3.png";

// =====================
// 敵画像
// =====================

const enemyImages = {
  yellow: [new Image(), new Image()],
  black: [new Image(), new Image()],
  white: [new Image(), new Image()]
};

enemyImages.yellow[0].src = "images/enemy_yellow_1.png";
enemyImages.yellow[1].src = "images/enemy_yellow_2.png";

enemyImages.black[0].src = "images/enemy_black_1.png";
enemyImages.black[1].src = "images/enemy_black_2.png";

enemyImages.white[0].src = "images/enemy_white_1.png";
enemyImages.white[1].src = "images/enemy_white_2.png";

// =====================
// ボス画像
// =====================

const bossImages = {
  shoot: new Image(),
  move: new Image(),
  stand: new Image(),
  tackle: new Image()
};

bossImages.shoot.src = "images/yuuka1.png";   // 射撃
bossImages.move.src = "images/yuuka2.png";    // 移動
bossImages.stand.src = "images/yuuka3.png";   // 停止
bossImages.tackle.src = "images/yuuka4.png";  // タックル

// =====================
// サウンド
// =====================

const bgmMenu = new Audio("audio/bgm_menu.mp3");
const bgmStage = new Audio("audio/bgm_stage.mp3");

const seCursor = new Audio("audio/se_cursor.mp3");
const seDecide = new Audio("audio/se_decide.mp3");
const seShot = new Audio("audio/se_shot.mp3");

bgmMenu.loop = true;
bgmStage.loop = true;

bgmMenu.volume = 0.4;
bgmStage.volume = 0.4;

seCursor.volume = 0.7;
seDecide.volume = 0.7;
seShot.volume = 0.5;

// =====================
// 敵設定
// =====================

const enemyTypes = [
  "yellow",
  "black",
  "white"
];

const enemyStatus = {
  white: {
    hp: 1,
    score: 10
  },

  yellow: {
    hp: 2,
    score: 20
  },

  black: {
    hp: 3,
    score: 30
  }
};

// =====================
// プレイヤー設定
// =====================

const playerStatus = {
  midori: {
    name: "MIDORI",
    jpName: "ミドリ",
    attack: 2,
    shotType: "single",
    description: "高火力の単発ショット"
  },

  momoi: {
    name: "MOMOI",
    jpName: "モモイ",
    attack: 0.5,
    shotType: "spread",
    description: "広範囲の散弾ショット"
  }
};

// =====================
// プレイヤー本体
// =====================

const player = {
  x: canvas.width / 2 - 40,
  y: canvas.height - 140,

  width: 80,
  height: 120,

  hitWidth: 42,
  hitHeight: 70,

  speed: 5
};

// =====================
// 配列
// =====================

const keys = {};
const bullets = [];
const enemies = [];
const bossBullets = [];

// =====================
// ボス本体
// =====================

let boss = null;
let bossTimer = 0;

// =====================
// ゲーム変数
// =====================

let score = 0;

let enemyTimer = 0;
let shootAnimation = 0;

// 難易度
let gameTime = 0;
let difficulty = 1;

// =====================
// キー操作
// =====================

document.addEventListener("keydown", (e) => {
  keys[e.code] = true;

  if (gameState === "title" && e.code === "Enter") {
    bgmMenu.currentTime = 0;
    bgmMenu.play();

    gameState = "select";
    return;
  }

  if (gameState === "select") {
    if (e.code === "ArrowLeft" || e.code === "KeyA") {
      selectedCharacter = "midori";

      seCursor.currentTime = 0;
      seCursor.play();
    }

    if (e.code === "ArrowRight" || e.code === "KeyD") {
      selectedCharacter = "momoi";
    }

    if (e.code === "Enter" || e.code === "Space") {

      seDecide.currentTime = 0;
      seDecide.play();

      startGame();
    }

    return;
  }

  if (gameState === "game" && e.code === "Space") {
    shootBullet();
  }

  if (gameState === "over" && e.code === "Enter") {
  bgmStage.pause();
  bgmStage.currentTime = 0;

  bgmMenu.currentTime = 0;
  bgmMenu.play();

  gameState = "title";
}
});

document.addEventListener("keyup", (e) => {
  keys[e.code] = false;
});

// =====================
// ゲーム開始
// =====================

function startGame() {
  player.x = canvas.width / 2 - 40;
  player.y = canvas.height - 140;

  bullets.length = 0;
  enemies.length = 0;
  bossBullets.length = 0;

  boss = null;
  bossTimer = 0;

  score = 0;
  enemyTimer = 0;
  shootAnimation = 0;

  bgY = 0;
  gameTime = 0;
  difficulty = 1;

  bgmMenu.pause();
  bgmMenu.currentTime = 0;

  bgmStage.loop = true;
  bgmStage.volume = 0.4;
  bgmStage.currentTime = 0;
  bgmStage.play();

  gameState = "game";
}

// =====================
// 難易度・背景
// =====================

function updateDifficulty() {
  gameTime++;

  if (gameTime % 600 === 0) {
    difficulty += 0.2;
  }
}

function updateBackground() {
  bgY += bgSpeed;

  if (bgY >= canvas.height) {
    bgY = 0;
  }
}

function drawBackground() {
  ctx.drawImage(backgroundImg, 0, bgY, canvas.width, canvas.height);
  ctx.drawImage(backgroundImg, 0, bgY - canvas.height, canvas.width, canvas.height);
}

// =====================
// 自機ショット
// =====================

function shootBullet() {

  seShot.currentTime = 0;
  seShot.play();

  const status = playerStatus[selectedCharacter];

  if (status.shotType === "single") {
    createBullet(0);
  }

  if (status.shotType === "spread") {
    createBullet(-2.5);
    createBullet(0);
    createBullet(2.5);
  }

  shootAnimation = 6;
}

function createBullet(angleX) {
  const bulletWidth = 6;
  const bulletHeight = 14;
  const status = playerStatus[selectedCharacter];

  bullets.push({
    x: player.x + player.width / 2 - bulletWidth / 2,
    y: player.y,
    width: bulletWidth,
    height: bulletHeight,
    speed: 8,
    vx: angleX,
    attack: status.attack
  });
}

// =====================
// 通常敵
// =====================

function createEnemy() {
  const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];

  const enemyWidth = 54;
  const enemyHeight = 54;

  enemies.push({
    type: type,

    x: Math.random() * (canvas.width - enemyWidth),
    y: -enemyHeight,

    width: enemyWidth,
    height: enemyHeight,

    speed: 1.8 + Math.random() * 1.6 + difficulty * 0.4,

    hp: enemyStatus[type].hp,
    maxHp: enemyStatus[type].hp,
    score: enemyStatus[type].score,

    animationTimer: 0,
    frame: 0
  });
}

function updateEnemies() {
  enemyTimer++;

  const spawnInterval = Math.max(15, 45 - difficulty * 8);

  if (enemyTimer > spawnInterval) {
    createEnemy();
    enemyTimer = 0;
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const enemy = enemies[i];

    enemy.y += enemy.speed;

    enemy.animationTimer++;

    if (enemy.animationTimer > 10) {
      enemy.frame = enemy.frame === 0 ? 1 : 0;
      enemy.animationTimer = 0;
    }

    if (enemy.y > canvas.height) {
      enemies.splice(i, 1);
    }
  }
}

// =====================
// ボス生成・行動
// =====================

function createBoss() {
  enemies.length = 0;

  boss = {
    x: canvas.width / 2 - 60,
    y: 40,
    width: 120,
    height: 150,

    hp: 300,
    maxHp: 300,

    speed: 2,
    direction: 1,

    state: "stand",

    shootTimer: 0,
    tackleTimer: 0,

    vx: 0,
    vy: 0
  };
}

function updateBoss() {
  bossTimer++;

  // 20秒後にボス登場
  if (!boss && bossTimer > 60 * 20) {
  createBoss();
}

  if (!boss) return;

  boss.shootTimer++;
  boss.tackleTimer++;

  // タックル中
  if (boss.state === "tackle") {
    boss.x += boss.vx;
    boss.y += boss.vy;

    if (
      boss.x < -boss.width ||
      boss.x > canvas.width ||
      boss.y < -boss.height ||
      boss.y > canvas.height
    ) {
      boss.x = canvas.width / 2 - boss.width / 2;
      boss.y = 40;
      boss.state = "stand";
      boss.tackleTimer = 0;
    }

    return;
  }

  // 通常移動
  boss.x += boss.speed * boss.direction;
  boss.state = "move";

  if (boss.x <= 0 || boss.x + boss.width >= canvas.width) {
    boss.direction *= -1;
  }

  // 紫の散弾
  if (boss.shootTimer > 70) {
    boss.state = "shoot";
    bossShootSpread();
    boss.shootTimer = 0;
  }

  // タックル予告：画像だけ先に変える
  if (boss.tackleTimer > 60 * 4 && boss.tackleTimer <= 60 * 5) {
    boss.state = "tackling";
  }

  // 5秒ごとに自機狙いタックル
  if (boss.tackleTimer > 60 * 5) {
    startBossTackle();
  }
 }
function bossShootSpread() {
  if (!boss) return;

  const baseX = boss.x + boss.width / 2;
  const baseY = boss.y + boss.height - 20;

  const shots = [
    { vx: -2.5, vy: 4.5 },
    { vx: 0, vy: 5 },
    { vx: 2.5, vy: 4.5 }
  ];

  shots.forEach((shot) => {
    bossBullets.push({
      x: baseX,
      y: baseY,

      width: 10,
      height: 10,

      vx: shot.vx,
      vy: shot.vy
    });
  });
}

function startBossTackle() {
  if (!boss) return;

  boss.state = "tackle";
  boss.tackleTimer = 0;

  const bossCenterX = boss.x + boss.width / 2;
  const bossCenterY = boss.y + boss.height / 2;

  const playerCenterX = player.x + player.width / 2;
  const playerCenterY = player.y + player.height / 2;

  const dx = playerCenterX - bossCenterX;
  const dy = playerCenterY - bossCenterY;

  const length = Math.sqrt(dx * dx + dy * dy);

  boss.vx = (dx / length) * 7;
  boss.vy = (dy / length) * 7;
}

function updateBossBullets() {
  for (let i = bossBullets.length - 1; i >= 0; i--) {
    const bullet = bossBullets[i];

    bullet.x += bullet.vx;
    bullet.y += bullet.vy;

    if (
      bullet.x < -30 ||
      bullet.x > canvas.width + 30 ||
      bullet.y > canvas.height + 30
    ) {
      bossBullets.splice(i, 1);
    }
  }
}

// =====================
// プレイヤー更新
// =====================

function updatePlayer() {
  if (keys["ArrowLeft"] || keys["KeyA"]) {
    player.x -= player.speed;
  }

  if (keys["ArrowRight"] || keys["KeyD"]) {
    player.x += player.speed;
  }

  if (keys["ArrowUp"] || keys["KeyW"]) {
    player.y -= player.speed;
  }

  if (keys["ArrowDown"] || keys["KeyS"]) {
    player.y += player.speed;
  }

  player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
}

// =====================
// 自機弾更新
// =====================

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].x += bullets[i].vx;
    bullets[i].y -= bullets[i].speed;

    if (
      bullets[i].y + bullets[i].height < 0 ||
      bullets[i].x + bullets[i].width < 0 ||
      bullets[i].x > canvas.width
    ) {
      bullets.splice(i, 1);
    }
  }
}

// =====================
// 射撃画像アニメ
// =====================

function updateShootAnimation() {
  if (shootAnimation > 0) {
    shootAnimation--;
  }
}

// =====================
// 当たり判定
// =====================

function isHit(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function getPlayerHitbox() {
  return {
    x: player.x + (player.width - player.hitWidth) / 2,
    y: player.y + 35,
    width: player.hitWidth,
    height: player.hitHeight
  };
}

function checkCollisions() {
  const playerHitbox = getPlayerHitbox();

  // 通常敵との当たり判定
  for (let i = enemies.length - 1; i >= 0; i--) {    if (isHit(playerHitbox, enemies[i])) {
      gameState = "over";
    }

    for (let j = bullets.length - 1; j >= 0; j--) {
      if (isHit(bullets[j], enemies[i])) {
        enemies[i].hp -= bullets[j].attack;
        bullets.splice(j, 1);

        if (enemies[i].hp <= 0) {
          score += enemies[i].score;
          enemies.splice(i, 1);
        }

        break;
      }
    }
  }

  // ボス本体との当たり判定
  if (boss) {
    if (isHit(playerHitbox, boss)) {
      gameState = "over";
    }

    for (let j = bullets.length - 1; j >= 0; j--) {
      if (isHit(bullets[j], boss)) {
        boss.hp -= bullets[j].attack;
        bullets.splice(j, 1);

        if (boss.hp <= 0) {
          score += 1000;
          boss = null;
          bossBullets.length = 0;
          bossTimer = 0;
         }

        break;
      }
    }
  }

  // ボス弾との当たり判定
  for (let i = bossBullets.length - 1; i >= 0; i--) {
    if (isHit(playerHitbox, bossBullets[i])) {
      gameState = "over";
      bossBullets.splice(i, 1);
    }
  }
}

// =====================
// 描画：タイトル
// =====================

function drawTitle() {
  ctx.drawImage(titleImg, 0, 0, canvas.width, canvas.height);
}

// =====================
// 描画：キャラ選択
// =====================

function drawCharacterSelect() {
  drawBackground();

  ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.fillStyle = "white";
  ctx.font = "bold 26px sans-serif";
  ctx.fillText("キャラクター選択", canvas.width / 2, 55);

  drawCharacterCard("midori", 25, 100, 160, 380, "#22c55e");
  drawCharacterCard("momoi", 215, 100, 160, 380, "#ec4899");

  drawButton(110, 515, 180, 50, "決定", "#06b6d4");

  ctx.fillStyle = "#cbd5e1";
  ctx.font = "13px sans-serif";
  ctx.fillText("← → で選択 / Enterで決定", canvas.width / 2, 590);

  ctx.textAlign = "left";
}

function drawCharacterCard(type, x, y, w, h, color) {
  const isSelected = selectedCharacter === type;

  ctx.fillStyle = "rgba(15, 23, 42, 0.9)";
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = isSelected ? color : "#475569";
  ctx.lineWidth = isSelected ? 4 : 2;
  ctx.strokeRect(x, y, w, h);

  const img = playerImages[type].stand;
  ctx.drawImage(img, x + 35, y + 25, 90, 180);

  ctx.fillStyle = color;
  ctx.font = "bold 22px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(playerStatus[type].name, x + w / 2, y + 235);

  ctx.fillStyle = "white";
  ctx.font = "14px sans-serif";
  ctx.fillText(playerStatus[type].jpName, x + w / 2, y + 262);

  ctx.fillStyle = "#cbd5e1";
  ctx.font = "13px sans-serif";
  ctx.fillText(playerStatus[type].description, x + w / 2, y + 300);

  ctx.fillStyle = "#facc15";
  ctx.fillText("攻撃力: " + playerStatus[type].attack, x + w / 2, y + 330);

  if (isSelected) {
    ctx.fillStyle = color;
    ctx.font = "bold 16px sans-serif";
    ctx.fillText("SELECT", x + w / 2, y + 365);
  }
}

function drawButton(x, y, w, h, text, color) {
  ctx.fillStyle = "rgba(2, 6, 23, 0.9)";
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = color;
  ctx.font = "bold 26px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(text, x + w / 2, y + h / 2 + 9);
}

// =====================
// 描画：プレイヤー
// =====================

function drawPlayer() {

  let img = playerImages[selectedCharacter].normal;

  if (shootAnimation > 0) {
    img = playerImages[selectedCharacter].shoot;
  }

  ctx.drawImage(
    img,
    player.x,
    player.y,
    player.width,
    player.height
  );
}

// =====================
// 描画：自機弾
// =====================

function drawBullets() {
  ctx.shadowColor = selectedCharacter === "midori" ? "#39ff14" : "#ff7ac8";
  ctx.shadowBlur = 10;
  ctx.fillStyle = selectedCharacter === "midori" ? "#39ff14" : "#ff7ac8";

  bullets.forEach((bullet) => {
    ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
  });

  ctx.shadowBlur = 0;
}

// =====================
// 描画：通常敵
// =====================

function drawEnemies() {
  enemies.forEach((enemy) => {
    const img = enemyImages[enemy.type][enemy.frame];

    ctx.drawImage(img, enemy.x, enemy.y, enemy.width, enemy.height);
    drawEnemyHpBar(enemy);
  });
}

function drawEnemyHpBar(enemy) {
  const hpRate = enemy.hp / enemy.maxHp;

  ctx.fillStyle = "#111827";
  ctx.fillRect(enemy.x, enemy.y - 8, enemy.width, 5);

  ctx.fillStyle = "#22c55e";
  ctx.fillRect(enemy.x, enemy.y - 8, enemy.width * hpRate, 5);
}

// =====================
// 描画：ボス
// =====================

function drawBoss() {
  if (!boss) return;

  let img = bossImages.stand;

  if (boss.state === "move") {
    img = bossImages.move;
  }

  if (boss.state === "shoot") {
    img = bossImages.shoot;
  }

  if (boss.state === "tackle" || boss.state === "tackling") {
    img = bossImages.tackle;
  }

  ctx.drawImage(img, boss.x, boss.y, boss.width, boss.height);

  drawBossHpBar();
}

function drawBossHpBar() {
  if (!boss) return;

  const hpRate = boss.hp / boss.maxHp;

  ctx.fillStyle = "#111827";
  ctx.fillRect(40, 15, 320, 12);

  ctx.fillStyle = "#a855f7";
  ctx.fillRect(40, 15, 320 * hpRate, 12);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 1;
  ctx.strokeRect(40, 15, 320, 12);

  ctx.fillStyle = "white";
  ctx.font = "12px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("YUUKA", canvas.width / 2, 12);

  ctx.textAlign = "left";
}

// =====================
// 描画：ボス弾
// =====================

function drawBossBullets() {

  bossBullets.forEach((bullet) => {

    // 外側の紫
    ctx.beginPath();
    ctx.fillStyle = "#ff00ff";
    ctx.arc(
      bullet.x,
      bullet.y,
      bullet.width / 2,
      0,
      Math.PI * 2
    );
    ctx.fill();

    // 発光
    ctx.beginPath();
    ctx.fillStyle = "rgba(255,0,255,0.4)";
    ctx.arc(
      bullet.x,
      bullet.y,
      bullet.width,
      0,
      Math.PI * 2
    );
    ctx.fill();

    // 中央の白
    ctx.beginPath();
    ctx.fillStyle = "#ffffff";
    ctx.arc(
      bullet.x,
      bullet.y,
      bullet.width / 4,
      0,
      Math.PI * 2
    );
    ctx.fill();

  });

}

// =====================
// 描画：スコア
// =====================

function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "18px sans-serif";
  ctx.textAlign = "left";

  ctx.fillText("SCORE: " + score, 10, 35);
  ctx.fillText("PLAYER: " + playerStatus[selectedCharacter].name, 10, 60);
  ctx.fillText("TIME: " + Math.floor(gameTime / 60), 10, 85);
  ctx.fillText("LEVEL: " + difficulty.toFixed(1), 10, 110);
}

// =====================
// 描画：ゲームオーバー
// =====================

function drawGameOver() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.fillStyle = "white";
  ctx.font = "36px sans-serif";
  ctx.fillText("GAME OVER", canvas.width / 2, 270);

  ctx.font = "18px sans-serif";
  ctx.fillText("Enterキーでタイトルへ", canvas.width / 2, 315);

  ctx.textAlign = "left";
}

// =====================
// メインループ
// =====================

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === "title") {

  drawTitle();
  }

  if (gameState === "select") {
    updateBackground();
    drawCharacterSelect();
  }

  if (gameState === "game") {
    updateBackground();
    updateDifficulty();

    updatePlayer();
    updateBullets();

    updateBoss();

  if (!boss) {
    updateEnemies();
  }

    updateBossBullets();

    updateShootAnimation();
    checkCollisions();

    drawBackground();

    drawPlayer();
    drawBullets();

    drawEnemies();

    drawBossBullets();
    drawBoss();

    drawScore();
  }

  if (gameState === "over") {
    drawBackground();

    drawPlayer();
    drawBullets();

    drawEnemies();

    drawBossBullets();
    drawBoss();

    drawScore();
    drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
